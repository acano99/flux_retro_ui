name: flux_retro_ui
description: "A new Flutter package project."
version: 0.0.1
homepage:

environment:
  sdk: ^3.11.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/ic_noise_texture.png

  fonts:
    - family: RetroTitle
      fonts:
        - asset: assets/StintUltraCondensed-Regular.ttf

    - family: RetroData
      fonts:
        - asset: assets/CourierPrime-Regular.ttf
          weight: 400
        - asset: assets/CourierPrime-Bold.ttf
          weight: 700
        - asset: assets/CourierPrime-Italic.ttf
          style: italic
